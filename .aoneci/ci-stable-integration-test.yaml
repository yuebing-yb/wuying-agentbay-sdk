name: "CI Stable Integration Test"

triggers:
  schedule:
  - cron: "0 2 * * *"  # Run every day at 2:00 AM
    always: true

params:
  test_type:
    name: Test Type
    type: string
    default: "all"
    options:
      - "all"
      - "python"
      - "typescript"
      - "golang"
      - "java"

traits:
  - type: notification
    properties:
      types: dingtalk
      when: failure
      users:
        - 187788
        - WB02016330
      content: |
        ---
        - **CI Stable Test**
            - @${{git.repo}}
            - **Branch**: ${{git.branch}}
            - **Commit**: ${{git.commitId}}

        🚨 **稳定集成测试失败**

        📊 **测试结果：** ${{jobs.ci-stable-test.outputs.test_summary}}

        **失败测试详情：**
        ${{jobs.ci-stable-test.outputs.failed_tests}}

        💡 标记为 ci-stable 的测试应该始终通过，请尽快排查。

jobs:
  ci-stable-test:
    name: "CI Stable Integration Test"
    runs-on:
      - "4-16Gi"
    image: alios-8u
    timeout: 2h
    outputs:
      test_summary: ${{steps.run-stable-tests.outputs.test_summary}}
      failed_tests: ${{steps.run-stable-tests.outputs.failed_tests}}
    steps:
      - uses: checkout
        inputs:
          fetch-depth: '0'

      - uses: setup-env
        inputs:
          python-version: '3.12'
          node-version: '18'
          go-version: '1.24.3'
          go-mod-cache: true
          go-cache: true
          java-version: '11'
          maven-version: '3.9'

      - id: run-stable-tests
        name: "Run CI Stable Tests"
        run: |
          echo "🔄 Setting up environment for CI Stable Tests..."

          # Setup Golang
          if [ "${{params.test_type}}" = "golang" ] || [ "${{params.test_type}}" = "all" ]; then
            go env -w GOPROXY=https://goproxy.cn,direct
            go env -w GOSUMDB=sum.golang.google.cn
            go env -w GOTOOLCHAIN=local
            if [ -d "golang" ]; then
              cd golang && go mod download && cd ..
            fi
          fi

          # Setup Java
          if [ "${{params.test_type}}" = "java" ] || [ "${{params.test_type}}" = "all" ]; then
            cd java/agentbay && mvn clean compile test-compile && cd ../..
          fi

          # Setup TypeScript
          if [ "${{params.test_type}}" = "typescript" ] || [ "${{params.test_type}}" = "all" ]; then
            if [ -d "typescript" ]; then
              cd typescript
              npm config set fetch-timeout 300000
              npm ci --prefer-offline --no-audit
              cd ..
            fi
          fi

          # Setup Python
          python -m pip install --upgrade pip
          pip install "darabonba-core>=1.0.0,<2.0.0" \
                      "alibabacloud-tea-openapi>=0.4.0rc3" \
                      "cryptography>=44.0.0" \
                      "httpx>=0.28.1" \
                      "alibabacloud-tea-util>=0.3.13" \
                      "python-dotenv>=1.0.0" \
                      "pydantic>=2.0" \
                      "loguru>=0.7.0"
          pip install pytest pytest-asyncio
          pip install langchain-openai langgraph langchain-core

          cd /aoneci/runner/work/source || exit 1
          pip install -e ./python/
          export PYTHONPATH="${PYTHONPATH}:$(pwd)/python"
          export AGENTBAY_API_KEY="${{secrets.AGENTBAY_API_KEY}}"
          export DASHSCOPE_API_KEY="${{secrets.DASHSCOPE_API_KEY}}"

          if [ "${{params.test_type}}" = "golang" ] || [ "${{params.test_type}}" = "all" ]; then
            export GOPROXY=https://goproxy.cn,direct
            export GOSUMDB=sum.golang.google.cn
            export GOTOOLCHAIN=local
          fi

          echo "🚀 Running CI Stable Example Checks..."
          python scripts/check_examples.py --ci-stable || echo "⚠️ Some ci-stable examples failed"

          echo "🚀 Running CI Stable Integration Tests..."
          python scripts/smart_test_runner.py --test-type="${{params.test_type}}" --ci-stable --skip-oss

          # Process report
          if [ -f "test_report.md" ]; then
            TOTAL_TESTS=$(grep -o "[0-9]\+ Tests" test_report.md | grep -o "[0-9]\+" || echo "0")
            PASSED_TESTS=$(grep -o "✅ [0-9]\+ Passed" test_report.md | grep -o "[0-9]\+" || echo "0")
            FAILED_TESTS=$(grep -o "❌ [0-9]\+ Failed" test_report.md | grep -o "[0-9]\+" || echo "0")

            FAILED_TESTS=${FAILED_TESTS:-0}
            PASSED_TESTS=${PASSED_TESTS:-0}

            TEST_CASE_JSON="{\"name\": \"CI稳定集成测试\", \"failed\": $FAILED_TESTS, \"skipped\": 0, \"passed\": $PASSED_TESTS}"
            echo "TEST_CASE=$TEST_CASE_JSON" >> $AONE_CI_SUMMARY

            TEST_CASE_SUMMARY="$TOTAL_TESTS Tests | ✅ $PASSED_TESTS Passed | ❌ $FAILED_TESTS Failed"
            echo "$TEST_CASE_SUMMARY" > "${{outputs.test_summary.path}}"

            if [ "$FAILED_TESTS" -gt 0 ]; then
              grep "测试ID:" test_report.md | head -10 | sed 's/测试ID: /- /' > "${{outputs.failed_tests.path}}"
              exit 1
            else
              echo "✅ 所有稳定测试都通过了！" > "${{outputs.failed_tests.path}}"
            fi
          fi
