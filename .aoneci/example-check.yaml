name: "Multi-Language Examples Inspection"

triggers:
  # Manual trigger is implied, remove explicit manual config if it's invalid
  schedule:
  - cron: "0 3 * * *"  # Run every day at 3:00 AM
    always: true

params:
  python:
    name: Python Examples
    type: boolean
    default: true
  typescript:
    name: TypeScript Examples
    type: boolean
    default: true
  golang:
    name: Golang Examples
    type: boolean
    default: true

traits:
  - type: notification
    properties:
      types: dingtalk
      when: all
      users: 
        - 187788
        - WB02016330
      content: |
        📝 **多语言示例检查报告**
        - 仓库: ${{git.repo}}
        - 分支: ${{git.branch}}
        - 提交: ${{git.commitId}}

        📊 检查结果: ${{jobs.example-check.outputs.example_summary}}

        失败详情: ${{jobs.example-check.outputs.failed_examples}}

        💡 请查看CI详情页面获取详细日志。

jobs:
  example-check:
    name: "Examples Inspection"
    runs-on:
      - "4-16Gi"
    image: alios-8u
    timeout: 5h
    retry:
      max: 1
      when:
        - runner_system_failure
    outputs:
      example_summary: ${{steps.run-checks.outputs.example_summary}}
      failed_examples: ${{steps.run-checks.outputs.failed_examples}}
    steps:
      - uses: checkout
      
      - uses: setup-env
        inputs:
          python-version: '3.10'
          node-version: '18'
          npm-version: '10'
          go-version: '1.24.3'
          
      - id: run-checks
        name: "Run Example Checks"
        run: |
          echo "🔧 Setting up Environment..."
          
          # Install Python Dependencies
          echo "🐍 Setting up Python..."
          python -m pip install --upgrade pip
          python -m pip install -e ./python/
          python -m pip install pytest playwright python-dotenv langchain-openai langgraph langchain-core
          playwright install chromium || echo "⚠️ Playwright install failed"
          if [ -f "python/requirements.txt" ]; then
            python -m pip install -r python/requirements.txt
          fi
          
          # Install TypeScript Dependencies
          echo "📜 Setting up TypeScript..."
          if [ "${{params.typescript}}" == "true" ]; then
            cd typescript
            npm ci
            npm run build
            npm link
            npm link wuying-agentbay-sdk
            npm install --no-save ts-node
            npx playwright install chromium || echo "⚠️ Playwright install failed"
            cd ..
          fi
          
          # Install Golang Dependencies
          echo "🐹 Setting up Golang..."
          if [ "${{params.golang}}" == "true" ]; then
            cd golang
            go env -w GOPROXY=https://goproxy.cn,direct
            go mod download
            go run github.com/playwright-community/playwright-go/cmd/playwright@latest install chromium || echo "⚠️ Playwright install failed"
            cd ..
          fi
          
          echo "🚀 Starting Examples Inspection..."
          export AGENTBAY_API_KEY="${{secrets.AGENTBAY_API_KEY}}"
          export DASHSCOPE_API_KEY="${{secrets.DASHSCOPE_API_KEY}}"
          
          # Run checks sequentially but capture failures
          FAILED=false
          
          if [ "${{params.python}}" == "true" ]; then
            echo "=== Running Python Checks ==="
            set +e
            python scripts/check_examples.py --lang python --ci-stable
            if [ $? -ne 0 ]; then FAILED=true; fi
            set -e
          fi

          if [ "${{params.typescript}}" == "true" ]; then
            echo "=== Running TypeScript Checks ==="
            set +e
            python scripts/check_examples.py --lang typescript --ci-stable
            if [ $? -ne 0 ]; then FAILED=true; fi
            set -e
          fi

          if [ "${{params.golang}}" == "true" ]; then
            echo "=== Running Golang Checks ==="
            set +e
            python scripts/check_examples.py --lang golang --ci-stable
            if [ $? -ne 0 ]; then FAILED=true; fi
            set -e
          fi
          
          # Check if report was generated and extract statistics
          if [ -f "example_check_report.md" ]; then
            echo "✅ Example check report generated successfully"
            
            echo ""
            echo "=========================================="
            echo "      Examples Inspection Report"
            echo "=========================================="
            echo ""
            cat example_check_report.md
            
            # Extract statistics for summary from Chinese format
            TOTAL_EXAMPLES=$(grep -o "共检测 [0-9]\+ 个示例" example_check_report.md | grep -o "[0-9]\+" || echo "0")
            PASSED_EXAMPLES=$(grep -o "✅ [0-9]\+ 通过" example_check_report.md | grep -o "[0-9]\+" || echo "0")
            FAILED_EXAMPLES=$(grep -o "❌ [0-9]\+ 失败" example_check_report.md | grep -o "[0-9]\+" || echo "0")
            
            # Generate example summary for notification
            EXAMPLE_SUMMARY="$TOTAL_EXAMPLES Examples | ✅ $PASSED_EXAMPLES Passed | ❌ $FAILED_EXAMPLES Failed"
            
            # Extract failed example IDs for notification with language info
            if [ "$FAILED_EXAMPLES" -gt 0 ]; then
              # Extract failed examples with language detection from "#### 📄 path" lines
              FAILED_EXAMPLE_LIST=""
              grep "#### 📄" example_check_report.md | head -10 | while IFS= read -r line; do
                example_path=$(echo "$line" | sed 's/#### 📄 //')
                
                # Detect language based on path patterns
                if echo "$example_path" | grep -q "golang\|\.go"; then
                  lang="Golang"
                elif echo "$example_path" | grep -q "python\|\.py"; then
                  lang="Python"
                elif echo "$example_path" | grep -q "typescript\|\.ts\|\.js"; then
                  lang="TypeScript"
                else
                  lang="未知"
                fi
                
                # Clean up example path - get filename only
                clean_example=$(basename "$example_path")
                
                echo "- [$lang] $clean_example" >> /tmp/failed_examples_list
              done
              
              if [ -f /tmp/failed_examples_list ]; then
                FAILED_EXAMPLE_LIST=$(cat /tmp/failed_examples_list)
                rm -f /tmp/failed_examples_list
              fi
            else
              FAILED_EXAMPLE_LIST="✅ 所有示例都通过了！"
            fi
            
            # Output to step outputs for notification access
            echo "$EXAMPLE_SUMMARY" > "${{outputs.example_summary.path}}"
            printf "%s\n" "$FAILED_EXAMPLE_LIST" > "${{outputs.failed_examples.path}}"
            
            # Also append to CI summary
            cat example_check_report.md >> $AONE_CI_SUMMARY_MD
            
            # Archive as build artifacts
            mkdir -p artifacts
            cp example_check_report.md artifacts/example_check_report.md
          else
            echo "⚠️ No example check report generated"
            echo "⚠️ 示例检查报告未生成" > "${{outputs.example_summary.path}}"
            echo "无法生成示例检查报告" > "${{outputs.failed_examples.path}}"
            echo "## ❌ Example Check Report" >> $AONE_CI_SUMMARY_MD
            echo "No example check report was generated. Check the logs above for errors." >> $AONE_CI_SUMMARY_MD
          fi
          
          if [ "$FAILED" = "true" ]; then
            echo "❌ One or more example checks failed."
            exit 1
          else
            echo "✅ All enabled checks passed successfully."
            exit 0
          fi
          
      - id: display-example-results
        name: "Display Example Results"
        if: always()
        run: |
          if [ -f "example_check_report.md" ]; then
            # Show success summary from the summary line
            if grep -q "汇总" example_check_report.md; then
              SUMMARY_LINE=$(grep "汇总" example_check_report.md | head -1)
              echo "📊 $SUMMARY_LINE"
              echo ""
            fi
            
            # Create individual collapsible sections for each failed example - show AI analysis
            if grep -q "失败示例详情" example_check_report.md; then
              echo "📋 失败示例概览："
              echo ""
              
              # Process each failed example and show AI analysis in collapsible sections
              awk '
              BEGIN { 
                example_count = 0;
                in_example = 0;
                example_path = "";
                ai_analysis = "";
                current_section = "";
                in_details = 0;
              }
              
              # Start of a failed example
              /^#### 📄/ {
                # If we have a previous example, output it
                if (example_count > 0 && example_path != "" && ai_analysis != "") {
                  print "::group::" example_count ". " example_path " - 🤖 AI分析";
                  print ai_analysis;
                  print "::endgroup::";
                  print "";
                }
                
                # Start new example
                example_count++;
                in_example = 1;
                gsub(/^#### 📄 /, "", $0);
                example_path = $0;
                ai_analysis = "";
                current_section = "";
                in_details = 0;
                next;
              }
              
              # AI Analysis section start
              in_example && /<summary>🤖 AI 智能分析<\/summary>/ {
                current_section = "ai_analysis";
                in_details = 1;
                next;
              }
              
              # End of details section
              in_example && in_details && /<\/details>/ {
                current_section = "";
                in_details = 0;
                next;
              }
              
              # Collect AI analysis content
              in_example && current_section == "ai_analysis" && in_details {
                if ($0 != "") {
                  ai_analysis = ai_analysis $0 "\n";
                }
              }
              
              END {
                # Output the last example if exists
                if (example_count > 0 && example_path != "" && ai_analysis != "") {
                  print "::group::" example_count ". " example_path " - 🤖 AI分析";
                  print ai_analysis;
                  print "::endgroup::";
                }
                
                if (example_count == 0) {
                  print "⚠️ 未找到失败示例详情";
                }
              }
              ' example_check_report.md
              
            else
              echo "✅ 所有示例都通过了！"
            fi
          else
            echo "⚠️ 示例检查报告文件不存在"
          fi
