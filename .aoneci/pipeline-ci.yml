# agentbay SDK Multi-Language CI/CD Pipeline
name: "agentbay SDK Multi-Language Quality Assurance"

triggers:
  merge_request:
    types:
      - opened
      - reopened
    target-branches:
      - "**"

params:
  python_enabled:
    name: Enable Python Testing
    type: boolean
    default: true
  typescript_enabled:
    name: Enable TypeScript Testing
    type: boolean
    default: true
  golang_enabled:
    name: Enable Golang Testing
    type: boolean
    default: true
  docs_check_enabled:
    name: Enable Documentation Quality Check
    type: boolean
    default: true
  runs_on_resources:
    name: Resource Specification
    description: "Runtime container resource specification"
    default: "4-16Gi"
    options:
      - "4-16Gi"
      - "8-32Gi"
      - "16-64Gi"

jobs:
  # Documentation quality check job
  docs-quality-check:
    continue-on-error: false
    name: "Documentation Quality Check"
    when: "${{params.docs_check_enabled}}"
    runs-on:
      - "${{params.runs_on_resources}}"
    image: alios-8u
    timeout: 30m
    steps:
      - uses: checkout
      - uses: setup-env
        inputs:
          python-version: '3.10'
      
      - id: emoji-anchor-check
        name: "VS Code Emoji Anchor Compatibility Check"
        when: "${{params.docs_check_enabled}}"
        run: |
          echo "🔍 Checking emoji anchor compatibility for VS Code..."
          
          # Check for emoji anchor compatibility issues
          python scripts/check_markdown_links.py \
            --warn-emoji-anchors \
            --verbose \
            --strict
          
          # Check the exit code of the previous command
          if [ $? -ne 0 ]; then
            echo "❌ Found broken links! Failing the pipeline."
            exit 1
          fi
          
          echo "✅ Emoji anchor compatibility check completed"

  # Python testing job
  python-lint-test:
    name: "Python Code Quality Check"
    when: "${{params.python_enabled}}"
    runs-on:
      - "${{params.runs_on_resources}}"
    image: alios-8u
    timeout: 1h
    steps:

      - uses: checkout
      - uses: setup-env
        inputs:
          python-version: '3.10'
          pip-cache: true
      
      - id: python-lint
        continue-on-error: false
        name: "Python Code Quality Check & Security Check"
        when: "${{params.python_enabled}}"
        run: |
          cd python
          python -m pip install --upgrade pip
          # Install tools for linting
          pip install flake8 mypy bandit pip-audit
          pip install types-requests types-aiohttp types-Pillow types-setuptools types-pydantic || true
          # Run all checks
          flake8 agentbay tests --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=agentbay/modules/browser/eval
          echo "Flake8 check completed"
          mypy agentbay --install-types --no-error-summary --install-types --non-interactive
          echo "Type check completed"
          python -m bandit -r agentbay/ -v --skip B105,B106,B107
          echo "Bandit scan completed"
          echo "Executing pip-audit dependency vulnerability scan..."
          pip-audit --desc
          echo "Dependency vulnerability scan completed"

  # TypeScript testing job
  typescript-lint-test:
    name: "TypeScript Code Quality Check & Security Check"
    when: "${{params.typescript_enabled}}"
    image: alios-8u
    runs-on:
      - "${{params.runs_on_resources}}"
    steps:
      - uses: checkout
      - uses: setup-env
        inputs:
          node-version: "18"
          tnpm-version: "10"
          tnpm-cache: true
        
      - id: typescript-lint
        continue-on-error: false
        name: "TypeScript Code Format Check"
        when: "${{params.typescript_enabled}}"
        run: |
          cd typescript
          # Set tnpm timeout and retry strategy
          # Only install lint-related packages for better performance
          tnpm ci
          # Run lint using fallback script
          tnpm run lint
      

  # Golang testing job
  golang-lint-test:
    name: "Golang Code Quality Check & Security Check"
    when: "${{params.golang_enabled}}"
    image: alios-8u
    runs-on:
      - "${{params.runs_on_resources}}"
    steps:
      
      - uses: checkout
      - uses: setup-env
        inputs:
          go-version: "1.24.3"
          go-mod-cache: true
          go-cache: true
      
      - id: golang-lint
        continue-on-error: false
        name: "Golang Code Quality & Security Check"
        when: "${{params.golang_enabled}}"
        run: |
          # Configure Go environment
          cd golang
          
          # Download dependencies (use go-mod-cache from setup-env)
          go mod download
          go mod verify
          
          # Install linting tools
          echo "Installing Go linting tools..."
          # Install golangci-lint for comprehensive linting
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin latest
          
          # Install gosec for security scanning
          curl -sfL https://raw.githubusercontent.com/securecodewarrior/gosec/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.18.2
          
          # Install govulncheck for vulnerability scanning
          go install golang.org/x/vuln/cmd/govulncheck@latest
          
          # Ensure tools are in PATH
          echo "$(go env GOPATH)/bin" >> $PATH
          
          # Run basic checks that don't require additional tools
          echo "Building code..."
          go build -v ./api/client/... || echo "Build completed with warnings"
          echo "Running go vet..."
          go vet ./...
          
          # Run golangci-lint with configuration file
          echo "Running golangci-lint..."
          if [ -f ".golangci.yml" ]; then
            golangci-lint run --timeout=5m --config=.golangci.yml || {
              echo "Linting completed with issues found."
              echo "Issues found will be reported but won't fail the build."
            }
          else
            golangci-lint run --timeout=5m || {
              echo "Linting completed with issues found."
              echo "Issues found will be reported but won't fail the build."
            }
          fi
          
          # Run security scan with gosec
          echo "Running security scan with gosec..."
          gosec -fmt json -out gosec-results.json ./... || true
          
          # Check for vulnerabilities with govulncheck
          echo "Checking for vulnerabilities with govulncheck..."
          govulncheck ./... || true
          
          echo "All Golang quality checks completed"
      

  summary:
    name: "Multi-Language Quality Check Summary"
    needs: ["docs-quality-check", "python-lint-test", "typescript-lint-test", "golang-lint-test"]
    runs-on:
      - "4-16Gi"
    steps:
      - run: |
          echo "=========================================="
          echo "    agentbay SDK Multi-Language Quality Check Summary"
          echo "=========================================="
          echo ""
          echo "All prerequisite jobs have completed successfully!"
          echo ""
          echo "✅ Documentation Quality Check: PASSED"
          echo "✅ Python Lint: PASSED"
          echo "✅ TypeScript Lint: PASSED"
          echo "✅ Golang Lint: PASSED"
          echo ""
          echo "=========================================="
          echo "✅ All Quality Checks: PASSED"
          echo "=========================================="