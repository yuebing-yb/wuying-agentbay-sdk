name: "Smart Integration Test"

triggers:
  schedule:
  - cron: "0 0 * * *"  # Run every day at 0:00 AM
    always: true
    

params:
  test_type:
    name: Test Type
    type: string
    default: "all"
    options:
      - "all"
      - "python"
      - "typescript"
      - "golang"
      - "java"
  skip_specified_patterns:
    name: Skip Specified Test Patterns
    type: boolean
    default: true
    description: "Skip specified test patterns (OSS, Agent integration, Browser Agent, etc.) to avoid dependency issues"

traits:
  - type: notification
    properties:
      types: dingtalk
      when: all
      users: 
        - 187788
        - WB02016330
      content: |
        ---
        - **Test Report**
            - @${{git.repo}}
            - **Branch**: ${{git.branch}}
            - **Commit**: ${{git.commitId}}
            - **Changed By**: ${{git.employeeId}}
                      
        🤖 **智能集成测试报告**
        
        📊 **测试结果：** ${{jobs.smart-integration-test.outputs.test_summary}}
        
        **失败测试详情：**
        ${{jobs.smart-integration-test.outputs.failed_tests}}
        
        💡 请查看CI详情页面获取AI分析和修复建议。

jobs:
  smart-integration-test:
    name: "Smart Integration Test"
    runs-on:
      - "4-16Gi"
    image: alios-8u
    timeout: 5h
    outputs:
      test_summary: ${{steps.run-smart-tests.outputs.test_summary}}
      failed_tests: ${{steps.run-smart-tests.outputs.failed_tests}}
    steps:
      - uses: checkout
      
      - uses: setup-env
        inputs:
          python-version: '3.12'
          node-version: '18'
          go-version: '1.24.3'
          go-mod-cache: true
          go-cache: true
          java-version: '11'
          maven-version: '3.9'
          
      - id: run-smart-tests
        name: "Run Smart Tests"
        run: |
          echo "🔄 Installing dependencies for Smart Test Runner..."
          
          # Setup Golang dependencies if needed
          if [ "${{params.test_type}}" = "golang" ] || [ "${{params.test_type}}" = "all" ]; then
            echo "🐹 Setting up Golang environment..."
            # Configure Go environment (setup-env already installed Go)
            go env -w GOPROXY=https://goproxy.cn,direct
            go env -w GOSUMDB=sum.golang.google.cn
            go env -w GOTOOLCHAIN=local
            go version
            
            if [ -d "golang" ]; then
              cd golang
              go mod download
              # Install Playwright browsers for Golang tests
              echo "🎭 Installing Playwright browsers for Golang..."
              go run github.com/playwright-community/playwright-go/cmd/playwright@latest install --with-deps
              cd ..
            fi
          fi
          
          # Setup Java dependencies if needed
          if [ "${{params.test_type}}" = "java" ] || [ "${{params.test_type}}" = "all" ]; then
            echo "☕ Setting up Java environment..."
            # Java and Maven already installed by setup-env
            java -version
            mvn --version
          fi
          
          # Setup TypeScript dependencies if needed  
          if [ "${{params.test_type}}" = "typescript" ] || [ "${{params.test_type}}" = "all" ]; then
            echo "📜 Setting up TypeScript environment..."
            # Node.js and npm already installed by setup-env
            node --version
            npm --version
            
            if [ -d "typescript" ]; then
              cd typescript
              # Use npm ci like the working unit tests
              npm config set fetch-timeout 300000
              npm config set fetch-retry-mintimeout 20000
              npm config set fetch-retry-maxtimeout 120000
              npm ci --prefer-offline --no-audit
              
              # Verify ts-jest installation
              echo "🔍 Verifying ts-jest installation..."
              npm list ts-jest || echo "⚠️ ts-jest not found"
              
              # Install Playwright browsers for TypeScript tests
              echo "🎭 Installing Playwright browsers for TypeScript..."
              npx playwright install --with-deps || echo "⚠️ Playwright install failed"
              cd ..
            fi
          fi
          
          # Setup Python environment (always needed for the test runner itself)
          python -m pip config set global.timeout 600
          python -m pip config set global.retries 5
          python -m pip install --upgrade pip
          
          # Install Python dependencies similar to unit test job
          pip install "darabonba-core>=1.0.0,<2.0.0" \
                      "alibabacloud-tea-openapi>=0.4.0rc3" \
                      "cryptography>=44.0.0" \
                      "httpx>=0.28.1" \
                      "alibabacloud-tea-util>=0.3.13" \
                      "python-dotenv>=1.0.0" \
                      "pydantic>=2.0" \
                      "playwright>=1.5.0" \
                      "loguru>=0.7.0"
          
          # Install test dependencies
          pip install pytest pytest-cov pytest-asyncio
          
          # Install Playwright browsers for Python tests (needed for browser fingerprint tests)
          echo "🎭 Installing Playwright browsers for Python..."
          playwright install chrome --with-deps || echo "⚠️ Playwright Chrome install failed"
          
          # Install AI dependencies
          pip install langchain-openai langgraph langchain-core
          
          echo "🔧 Setting up environment..."
          # Ensure we're in the correct working directory
          cd /aoneci/runner/work/source || exit 1
          echo "📂 Current working directory: $(pwd)"
          
          # Install SDK in editable mode with correct path
          if [ -d "python" ]; then
            pip install -e ./python/
            echo "✅ Python SDK installed successfully"
          else
            echo "❌ Python directory not found"
            ls -la
            exit 1
          fi
          
          # Set PYTHONPATH similar to unit test job
          export PYTHONPATH="${PYTHONPATH}:$(pwd)/python"
          export AGENTBAY_API_KEY="${{secrets.AGENTBAY_API_KEY}}"
          export DASHSCOPE_API_KEY="${{secrets.DASHSCOPE_API_KEY}}"
          
          echo "🚀 Starting Smart Test Runner..."
          echo "Working directory: $(pwd)"
          echo "Python path: $PYTHONPATH"
          
          # Set up environment for test execution
          # Ensure we have the correct working directory
          cd /aoneci/runner/work/source || exit 1
          
          # Set Go environment variables if needed
          if [ "${{params.test_type}}" = "golang" ] || [ "${{params.test_type}}" = "all" ]; then
            export GOPROXY=https://goproxy.cn,direct
            export GOSUMDB=sum.golang.google.cn  
            export GOTOOLCHAIN=local
            echo "🔍 Checking Go installation..."
            which go || echo "❌ Go not found in PATH"
            go version || echo "❌ Go version check failed"
          fi
          
          if [ "${{params.test_type}}" = "typescript" ] || [ "${{params.test_type}}" = "all" ]; then
            echo "🔍 Checking Node.js installation..."
            which node || echo "❌ Node not found in PATH"
            node --version || echo "❌ Node version check failed"
            which npm || echo "❌ npm not found in PATH"
            npm --version || echo "❌ npm version check failed"
          fi
          
          if [ "${{params.test_type}}" = "java" ] || [ "${{params.test_type}}" = "all" ]; then
            echo "🔍 Checking Java installation..."
            which java || echo "❌ Java not found in PATH"
            java -version || echo "❌ Java version check failed"
            which mvn || echo "❌ Maven not found in PATH"
            mvn --version || echo "❌ Maven version check failed"
          fi
          
          # Run the smart test runner
          SKIP_PATTERNS_FLAG=""
          echo "🔍 检查 skip_specified_patterns 参数值: ${{params.skip_specified_patterns}}"
          if [ "${{params.skip_specified_patterns}}" = "true" ]; then
            SKIP_PATTERNS_FLAG="--skip-oss"
            echo "✅ Specified test patterns skipping enabled (--skip-oss)"
          else
            echo "⚠️ Specified test patterns skipping disabled, will run all tests"
          fi
          echo "🔍 SKIP_PATTERNS_FLAG 值: $SKIP_PATTERNS_FLAG"
          
          if python scripts/smart_test_runner.py --test-type="${{params.test_type}}" $SKIP_PATTERNS_FLAG; then
            echo "✅ Smart Test Runner completed successfully"
            
            # Check if test report was generated
          if [ -f "test_report.md" ]; then
            echo "✅ Test report generated successfully"
            
            # Display in CI Summary using 豆腐块 format
            # Extract test statistics
            TOTAL_TESTS=$(grep -o "[0-9]\+ Tests" test_report.md | grep -o "[0-9]\+" || echo "0")
            PASSED_TESTS=$(grep -o "✅ [0-9]\+ Passed" test_report.md | grep -o "[0-9]\+" || echo "0")
            FAILED_TESTS=$(grep -o "❌ [0-9]\+ Failed" test_report.md | grep -o "[0-9]\+" || echo "0")
            
            # Generate TEST_CASE 豆腐块 - ensure all required fields are present
            SKIPPED_TESTS=0  # Default to 0 if no skipped tests
            
            # Debug: Print variables before generating JSON
            echo "Debug: TOTAL_TESTS=$TOTAL_TESTS, PASSED_TESTS=$PASSED_TESTS, FAILED_TESTS=$FAILED_TESTS, SKIPPED_TESTS=$SKIPPED_TESTS"
            
            # Ensure variables are not empty
            FAILED_TESTS=${FAILED_TESTS:-0}
            PASSED_TESTS=${PASSED_TESTS:-0}
            SKIPPED_TESTS=${SKIPPED_TESTS:-0}
            
            # Generate JSON with explicit field values - ensure all three required fields are present
            TEST_CASE_JSON="{\"name\": \"智能集成测试\", \"failed\": $FAILED_TESTS, \"skipped\": $SKIPPED_TESTS, \"passed\": $PASSED_TESTS}"
            echo "Debug: Generated TEST_CASE_JSON=$TEST_CASE_JSON"
            echo "TEST_CASE=$TEST_CASE_JSON" >> $AONE_CI_SUMMARY
            
            # Generate test summary for notification
            TEST_CASE_SUMMARY="$TOTAL_TESTS Tests | ✅ $PASSED_TESTS Passed | ❌ $FAILED_TESTS Failed"
            
            # Extract failed test IDs for notification with language info
            if [ "$FAILED_TESTS" -gt 0 ]; then
              # Use simple list format
              FAILED_TEST_LIST=""
              
              # Extract failed tests with language detection
              grep -A1 "❌ 失败测试" test_report.md | grep "测试ID:" | head -10 | while IFS= read -r line; do
                test_id=$(echo "$line" | sed 's/测试ID: //')
                
                # Detect language based on test ID patterns
                if echo "$test_id" | grep -q "golang\|\.go\|github.com.*golang"; then
                  lang="Golang"
                elif echo "$test_id" | grep -q "python\|\.py\|pytest"; then
                  lang="Python"
                elif echo "$test_id" | grep -q "typescript\|\.ts\|\.js\|npm\|jest"; then
                  lang="TypeScript"
                elif echo "$test_id" | grep -q "java:"; then
                  lang="Java"
                else
                  lang="未知"
                fi
                
                # Clean up test ID - remove common prefixes and paths
                clean_test_id=$(echo "$test_id" | sed -e 's/^.*golang\/tests\/pkg\/integration\.//' -e 's/^.*\///' -e 's/^test_//' -e 's/^integration_//')
                
                echo "- [$lang] $clean_test_id" >> /tmp/failed_tests_list
              done
              
              if [ -f /tmp/failed_tests_list ]; then
                FAILED_TEST_LIST=$(cat /tmp/failed_tests_list)
                rm -f /tmp/failed_tests_list
              fi
            else
              FAILED_TEST_LIST="✅ 所有测试都通过了！"
            fi
            
            # Output to step outputs for notification access
            echo "$TEST_CASE_SUMMARY" > "${{outputs.test_summary.path}}"
            printf "%s\n" "$FAILED_TEST_LIST" > "${{outputs.failed_tests.path}}"
            
            
            
            # If there are failures, also add detailed results to Markdown summary
            if [ "$FAILED_TESTS" -gt 0 ]; then
              # Also show detailed results in markdown format for failed tests
              echo "## 🤖 Smart Integration Test Report" >> $AONE_CI_SUMMARY_MD
              echo "" >> $AONE_CI_SUMMARY_MD
              echo "📊 **Summary**: $TOTAL_TESTS Tests | ✅ $PASSED_TESTS Passed | ❌ $FAILED_TESTS Failed" >> $AONE_CI_SUMMARY_MD
              echo "" >> $AONE_CI_SUMMARY_MD
              echo "### 📋 失败测试详情" >> $AONE_CI_SUMMARY_MD
              echo "" >> $AONE_CI_SUMMARY_MD
              
              # Process each failed test and create collapsible sections (exclude AI fix prompts)
              awk '
              BEGIN { 
                test_count = 0;
                in_test = 0;
                test_id = "";
                ai_analysis = "";
                output_snippet = "";
                current_section = "";
              }
              
              # Start of a new failed test
              /^❌ 失败测试$/ {
                # Output previous test if exists
                if (test_count > 0 && test_id != "") {
                  print "<details>";
                  print "<summary>" test_count ". " test_id "</summary>";
                  print "";
                  
                  # AI Analysis subsection
                  if (ai_analysis != "") {
                    print "<details>";
                    print "<summary>🤖 AI分析</summary>";
                    print "";
                    print ai_analysis;
                    print "</details>";
                    print "";
                  }
                  
                  # Output snippet subsection
                  if (output_snippet != "") {
                    print "<details>";
                    print "<summary>📄 日志片段</summary>";
                    print "";
                    print "```";
                    print output_snippet;
                    print "```";
                    print "</details>";
                    print "";
                  }
                  
                  # Note about AI fix prompt
                  print "<details>";
                  print "<summary>🛠️ AI修复提示词</summary>";
                  print "";
                  print "请在CI日志的"Display Test Results"步骤中查看完整的AI修复提示词。";
                  print "</details>";
                  print "";
                  
                  print "</details>";
                  print "";
                }
                
                # Reset for new test
                test_count++;
                in_test = 1;
                test_id = "";
                ai_analysis = "";
                output_snippet = "";
                current_section = "";
                next;
              }
              
              # Capture test ID
              in_test && /^测试ID:/ {
                gsub(/^测试ID: /, "", $0);
                test_id = $0;
                next;
              }
              
              # Section headers
              in_test && /^🤖 AI Analysis/ {
                current_section = "ai_analysis";
                next;
              }
              
              in_test && /^📄 Output \(Snippet\)/ {
                current_section = "output_snippet";
                next;
              }
              
              in_test && /^🛠️ AI修复提示词/ {
                current_section = "skip";  # Skip AI fix prompt content
                next;
              }
              
              # Skip code block markers
              in_test && /^```/ {
                next;
              }
              
              # End of test section
              /^---$/ {
                in_test = 0;
                current_section = "";
                next;
              }
              
              # Collect content based on current section
              in_test && current_section == "ai_analysis" && $0 != "" {
                ai_analysis = ai_analysis $0 "\n";
              }
              
              in_test && current_section == "output_snippet" && $0 != "" {
                output_snippet = output_snippet $0 "\n";
              }
              
              END {
                # Output the last test
                if (test_count > 0 && test_id != "") {
                  print "<details>";
                  print "<summary>" test_count ". " test_id "</summary>";
                  print "";
                  
                  # AI Analysis subsection
                  if (ai_analysis != "") {
                    print "<details>";
                    print "<summary>🤖 AI分析</summary>";
                    print "";
                    print ai_analysis;
                    print "</details>";
                    print "";
                  }
                  
                  # Output snippet subsection
                  if (output_snippet != "") {
                    print "<details>";
                    print "<summary>📄 日志片段</summary>";
                    print "";
                    print "```";
                    print output_snippet;
                    print "```";
                    print "</details>";
                    print "";
                  }
                  
                  # Note about AI fix prompt
                  print "<details>";
                  print "<summary>🛠️ AI修复提示词</summary>";
                  print "";
                  print "请在CI日志的"Display Test Results"步骤中查看完整的AI修复提示词。";
                  print "</details>";
                  print "";
                  
                  print "</details>";
                  print "";
                }
                
                # Debug info
                print "<!-- Debug: Processed " test_count " failed tests -->";
              }
              ' test_report.md >> $AONE_CI_SUMMARY_MD
            fi
            
            # Archive as build artifacts
            mkdir -p artifacts
            cp test_report.md artifacts/smart_test_report.md
          else
            echo "⚠️ No test report generated"
            echo "## ❌ Smart Integration Test Report" >> $AONE_CI_SUMMARY_MD
            echo "No test report was generated. Check the logs above for errors." >> $AONE_CI_SUMMARY_MD
          fi
          else
            echo "❌ Smart Test Runner failed with exit code $?"
            echo "❌ CI pipeline will now fail"
            exit 1
          fi
          
      - id: display-test-results
        name: "Display Test Results"
        run: |
          if [ -f "test_report.md" ]; then
            # Show success summary from the summary line
            if grep -q "Tests |" test_report.md; then
              SUMMARY_LINE=$(grep "Tests |" test_report.md | head -1)
              echo "📊 $SUMMARY_LINE"
              echo ""
            fi
            
            # Create individual collapsible sections for each failed test - only show AI fix prompt
            if grep -q "❌ 失败测试" test_report.md; then
              echo "📋 失败测试概览："
              echo ""
              
              # Process each failed test and only show AI fix prompt in collapsible sections
              awk '
              BEGIN { 
                test_count = 0;
                in_test = 0;
                test_id = "";
                fix_prompt = "";
                current_section = "";
              }
              
              /^❌ 失败测试/ {
                # If we have a previous test, output it
                if (test_count > 0 && test_id != "" && fix_prompt != "") {
                  print "::group::" test_count ". " test_id " - 🛠️ AI修复提示词";
                  print "```";
                  print fix_prompt;
                  print "```";
                  print "::endgroup::";
                  print "";
                }
                
                # Start new test
                test_count++;
                in_test = 1;
                test_id = "";
                fix_prompt = "";
                current_section = "";
                
                # Read next line which should contain the test ID
                if (getline > 0 && /^测试ID:/) {
                  # Extract test ID from "测试ID: test_id_here"
                  gsub(/^测试ID: /, "", $0);
                  test_id = $0;
                }
                next;
              }
              
              /^🛠️ AI修复提示词/ && in_test {
                current_section = "fix_prompt";
                next;
              }
              
              /^```/ && in_test {
                # Skip code block markers
                next;
              }
              
              /^---$/ && in_test {
                # End of current test section
                in_test = 0;
                current_section = "";
                next;
              }
              
              in_test && current_section == "fix_prompt" {
                fix_prompt = fix_prompt $0 "\n";
              }
              
              END {
                # Output the last test if exists
                if (test_count > 0 && test_id != "" && fix_prompt != "") {
                  print "::group::" test_count ". " test_id " - 🛠️ AI修复提示词";
                  print "```";
                  print fix_prompt;
                  print "```";
                  print "::endgroup::";
                }
              }
              ' test_report.md
              
            else
              echo "✅ 所有测试都通过了！"
            fi
          else
            echo "⚠️ 测试报告文件不存在"
          fi
