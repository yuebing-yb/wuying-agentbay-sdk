# agentbay SDK Multi-Language Unit Tests Only Pipeline
name: "agentbay SDK Multi-Language Unit Tests"

triggers:
  merge_request:
    types:
      - opened
      - reopened
    target-branches:
      - "**"

params:
  python_enabled:
    name: Enable Python Unit Testing
    type: boolean
    default: true
  typescript_enabled:
    name: Enable TypeScript Unit Testing
    type: boolean
    default: true
  golang_enabled:
    name: Enable Golang Unit Testing
    type: boolean
    default: true
  java_enabled:
    name: Enable Java Unit Testing
    type: boolean
    default: true
  runs_on_resources:
    name: Resource Specification
    description: "Runtime container resource specification"
    default: "4-16Gi"
    options:
      - "4-16Gi"
      - "8-32Gi"
      - "16-64Gi"

jobs:
  # Python Unit Tests Only
  python-unit-test:
    name: "Python Unit Tests"
    when: ${{params.python_enabled}}
    runs-on:
      - "${{params.runs_on_resources}}"
    image: alios-8u
    timeout: 30m
    steps:
      - uses: checkout
      - uses: setup-env
        inputs:
          python-version: '3.10'
          pip-cache: true
      
      - id: python-test
        continue-on-error: false
        when: "${{params.python_enabled}}"
        name: "Python Unit Tests"
        run: |
          cd python
          python -m pip install --upgrade pip
          # Only install essential test-related packages for better performance
          pip install --prefer-binary \
            pytest==8.2.2 \
            pytest-asyncio==0.25.0 \
            pytest-xdist==3.6.1 \
            loguru==0.7.0 \
            python-dotenv==1.0.0 \
            pydantic==2.10.4 \
            httpx==0.28.1 \
            "darabonba-core>=1.0.0,<2.0.0" \
            "alibabacloud-tea-openapi>=0.4.0rc3" \
            "alibabacloud-tea-util>=0.3.13" \
            "playwright>=1.5.0" \
            "aliyun-log-python-sdk>=0.8.0" \
            "websockets>=15.0.1,<16.0.0" \
            pydoc-markdown \
            docspec
          # Install agentbay in development mode (minimal dependencies)
            pip install pytest>=8.2.2 pytest-asyncio>=0.25.0 pytest-xdist>=3.6.1
          # Add current directory to PYTHONPATH so tests can import agentbay
          export PYTHONPATH="${PYTHONPATH}:$(pwd)"
          # Run tests with asyncio mode enabled using python -m to ensure it's found
          python -m pytest tests/unit -q --tb=short -n auto

  # TypeScript Unit Tests Only
  typescript-unit-test:
    name: "TypeScript Unit Tests"
    when: ${{params.typescript_enabled}}
    image: alios-8u
    runs-on:
      - "${{params.runs_on_resources}}"
    steps:
      - uses: checkout
      - uses: setup-env
        inputs:
          node-version: "18"
          tnpm-version: "10"
          tnpm-cache: true
        
      - id: typescript-test-unit
        continue-on-error: false
        when: "${{params.typescript_enabled}}"
        name: "TypeScript Unit Tests"
        run: |
          cd typescript
          # Default suppress logs in CI to reduce noise and runtime overhead.
          # Can be overridden by explicitly setting SUPPRESS_TEST_LOGS=false.
          export SUPPRESS_TEST_LOGS="${SUPPRESS_TEST_LOGS:-true}"
          # Only install test-related packages for better performance
          tnpm install --prefer-offline --no-audit \
            jest@26.6.3 \
            ts-jest@26.5.6 \
            @types/jest@26.0.24 \
            typescript@4.9.5 \
            @types/node@18.19.130
          # Run tests using fallback script
          tnpm run build
          node scripts/run_with_fallback.js jest jest@26.6.3 tests/unit --maxWorkers=4 --cache

  # Golang Unit Tests Only
  golang-unit-test:
    name: "Golang Unit Tests"
    when: ${{params.golang_enabled}}
    image: alios-8u
    runs-on:
      - "${{params.runs_on_resources}}"
    steps:
      - uses: checkout
      - uses: setup-env
        inputs:
          go-version: "1.24.3"
          go-mod-cache: true
          go-cache: true
      
      - id: golang-unit-test
        continue-on-error: false
        when: "${{params.golang_enabled}}"
        name: "Golang Unit Tests"
        run: |
          # Configure Go environment
          cd golang
          # Download and verify dependencies
          go mod download
          go mod verify
          # Run tests with race detector
          go test -race -v ./tests/pkg/unit/...

  # Java Unit Tests Only
  java-unit-test:
    name: "Java Unit Tests"
    when: "${{params.java_enabled}}"
    image: alios-8u
    runs-on:
      - "${{params.runs_on_resources}}"
    steps:
      - uses: checkout
      - uses: setup-env
        inputs:
          java-version: "11"
          maven-version: "3.9"
      
      - id: java-unit-test
        continue-on-error: false
        when: "${{params.java_enabled}}"
        name: "Java Unit Tests"
        run: |
          # Configure Maven environment
          cd java/agentbay
          # Check Java and Maven versions
          java -version
          mvn --version
          # Run unit tests only (skip integration tests)
          mvn test

  # Unit Tests Summary
  unit-tests-summary:
    name: "Multi-Language Unit Tests Summary"
    needs: ["python-unit-test", "typescript-unit-test", "golang-unit-test", "java-unit-test"]
    runs-on:
      - "4-16Gi"
    steps:
      - run: |
          echo "=========================================="
          echo "    agentbay SDK Multi-Language Unit Tests Summary"
          echo "=========================================="
          echo ""
          echo "All unit tests have completed successfully!"
          echo ""
          echo "✅ Python Unit Tests: PASSED"
          echo "✅ TypeScript Unit Tests: PASSED"
          echo "✅ Golang Unit Tests: PASSED"
          echo "✅ Java Unit Tests: PASSED"
          echo ""
          echo "=========================================="
          echo "✅ All Unit Tests: PASSED"
          echo "=========================================="
