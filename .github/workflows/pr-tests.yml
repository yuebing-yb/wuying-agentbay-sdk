name: PR Tests

on:
  pull_request:
    branches: [ '*' ]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '*.md'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      typescript: ${{ steps.filter.outputs.typescript }}
      golang: ${{ steps.filter.outputs.golang }}
    steps:
      - uses: actions/checkout@v3
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'python/**'
            typescript:
              - 'typescript/**'
            golang:
              - 'golang/**'
              - '.golangci.yml'

  # ==================== Python Tests ====================
  python-lint:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black bandit pip-audit

    - name: Lint Python code
      working-directory: ./python
      run: |
        # Current code checking strategy: only run security scan, temporarily disable format checking
        # TODO: Re-enable the following format checks after the team confirms code style standards
        #flake8 agentbay --count --select=E9,F63,F7,F82 --show-source --statistics
        #black --check agentbay tests examples
        echo "Python lint check passed"

    - name: Security scan with Bandit
      working-directory: ./python
      run: |
        bandit -r agentbay -f json -o bandit-results.json --skip B105,B106,B107 || true

    - name: Check dependencies for vulnerabilities
      working-directory: ./python
      run: |
        pip install -e .
        pip-audit || true

    - name: SonarQube Scan
      uses: SonarSource/sonarcloud-github-action@master
      if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        projectBaseDir: ./python
        args: >
          -Dsonar.projectKey=wuying-agentbay-sdk_python
          -Dsonar.organization=wuying-agentbay
          -Dsonar.python.coverage.reportPaths=coverage.xml

  python-test:
    needs: python-lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      working-directory: ./python
      run: |
        python -m pip install --upgrade pip
        pip install poetry
        poetry install --with dev
        poetry run pip install pytest-asyncio

    - name: Run unit tests
      working-directory: ./python
      run: |
        poetry run python -m pytest tests/unit -v

  # ==================== TypeScript Tests ====================
  typescript-lint:
    needs: changes
    if: needs.changes.outputs.typescript == 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'typescript/package-lock.json'

    - name: Install dependencies
      working-directory: ./typescript
      run: npm ci --ignore-scripts

    - name: Lint TypeScript code
      working-directory: ./typescript
      run: npm run lint

    - name: SonarQube Scan
      uses: SonarSource/sonarcloud-github-action@master
      if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        projectBaseDir: ./typescript
        args: >
          -Dsonar.projectKey=wuying-agentbay-sdk_typescript
          -Dsonar.organization=wuying-agentbay
          -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info

  typescript-test:
    needs: typescript-lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: 'typescript/package-lock.json'

    - name: Install dependencies
      working-directory: ./typescript
      run: npm ci

    - name: Build TypeScript code
      working-directory: ./typescript
      run: npm run build

    - name: Run unit tests
      working-directory: ./typescript
      run: npm run test:unit

  # ==================== Golang Tests ====================
  golang-lint:
    needs: changes
    if: needs.changes.outputs.golang == 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: './golang/go.mod'
        check-latest: true

    - name: Configure Go environment
      run: |
        go env -w GOPROXY=https://proxy.golang.org,direct
        go env -w GOSUMDB=sum.golang.org
        go env -w GONOSUMDB=""
        echo "Go environment configured:"
        go env | grep -E "(GOPROXY|GOSUMDB|GONOSUMDB)"

    - name: Install Go 1.24 (fallback if not available)
      if: failure()
      run: |
        echo "Fallback: Installing Go 1.24 manually..."
        LATEST_GO_24=$(curl -s https://golang.org/dl/?mode=json | jq -r '.[].version' | grep '^go1\.24' | head -1)
        if [ -z "$LATEST_GO_24" ]; then
          echo "Go 1.24 not found, trying rc version..."
          LATEST_GO_24=$(curl -s https://golang.org/dl/?mode=json | jq -r '.[].version' | grep '^go1\.24rc' | head -1)
        fi
        if [ -z "$LATEST_GO_24" ]; then
          echo "Go 1.24 not available, using 1.23 instead"
          LATEST_GO_24="go1.23.4"
        fi
        echo "Installing $LATEST_GO_24..."
        wget -q "https://go.dev/dl/${LATEST_GO_24}.linux-amd64.tar.gz" -O go.tar.gz
        sudo rm -rf /usr/local/go
        sudo tar -C /usr/local -xzf go.tar.gz
        echo "/usr/local/go/bin" >> $GITHUB_PATH
        go version

    - name: Verify Go installation
      run: |
        go version
        echo "Go version: $(go version)"
        echo "GOROOT: $GOROOT"
        echo "GOPATH: $GOPATH"

    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Install dependencies
      working-directory: ./golang
      run: |
        echo "Current Go version: $(go version)"
        go clean -modcache
        go get github.com/alibabacloud-go/darabonba-openapi/v2@latest
        go mod tidy
        go mod download
        go mod verify
        echo "Final dependency versions:"
        go list -m all | grep alibabacloud-go

    - name: Verify dependencies
      working-directory: ./golang
      run: |
        echo "Verifying dependency setup..."
        echo "Current module versions:"
        go list -m all | grep -E "(darabonba-openapi|tea)"
        echo "Checking if types are available..."
        go mod why github.com/alibabacloud-go/darabonba-openapi/v2
        echo "Testing compilation of api/client..."
        go build -v ./api/client/...

    - name: Go vet
      working-directory: ./golang
      run: go vet ./...

    - name: SonarQube Scan
      uses: SonarSource/sonarcloud-github-action@master
      if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        projectBaseDir: ./golang
        args: >
          -Dsonar.projectKey=wuying-agentbay-sdk_golang
          -Dsonar.organization=wuying-agentbay
          -Dsonar.go.coverage.reportPaths=coverage.xml

  golang-test:
    needs: golang-lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.23', '1.24']

    steps:
    - uses: actions/checkout@v3

    - name: Set up Go ${{ matrix.go-version }}
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
        check-latest: true
        cache: false
      continue-on-error: true
      id: setup_go

    - name: Configure Go environment (test matrix)
      if: steps.setup_go.outcome == 'success'
      run: |
        go env -w GOPROXY=https://proxy.golang.org,direct
        go env -w GOSUMDB=sum.golang.org
        go env -w GONOSUMDB=""

    - name: Install Go manually (fallback for 1.24)
      if: steps.setup_go.outcome == 'failure' && matrix.go-version == '1.24'
      run: |
        echo "Manual installation for Go 1.24..."
        LATEST_GO=$(curl -s https://golang.org/dl/?mode=json | jq -r '.[].version' | grep '^go1\.24' | head -1)
        if [ -z "$LATEST_GO" ]; then
          LATEST_GO="go1.24rc1"
        fi
        echo "Installing $LATEST_GO..."
        wget -q "https://go.dev/dl/${LATEST_GO}.linux-amd64.tar.gz" -O go.tar.gz
        sudo rm -rf /usr/local/go
        sudo tar -C /usr/local -xzf go.tar.gz
        echo "/usr/local/go/bin" >> $GITHUB_PATH
        go version

    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ matrix.go-version }}-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-${{ matrix.go-version }}-

    - name: Verify dependencies
      working-directory: ./golang
      run: |
        echo "Test matrix Go version: $(go version)"
        if [[ "$(go version)" != *"go1.24"* ]]; then
          echo "Different Go version detected, cleaning module cache..."
          go clean -modcache
          go get github.com/alibabacloud-go/darabonba-openapi/v2@latest
          go mod tidy
          go mod download
          go mod verify
        else
          echo "Same Go version as lint job, dependencies should already be available"
          go mod verify
        fi

    - name: Build
      working-directory: ./golang
      run: go build -v ./...

    - name: Run unit tests
      working-directory: ./golang
      run: go test -race -v ./tests/pkg/unit/...
